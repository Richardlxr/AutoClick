name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name ClickMacro app.py

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package/ClickMacro | Out-Null
          Copy-Item dist/ClickMacro.exe package/ClickMacro/ClickMacro.exe
          Copy-Item README.md package/ClickMacro/README.md
          Compress-Archive -Path package/ClickMacro -DestinationPath ClickMacro-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickMacro-windows
          path: ClickMacro-windows.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" ClickMacro-windows.zip `
            --title "ClickMacro ${{ github.ref_name }}" `
            --notes "Windows executable build for ClickMacro."
